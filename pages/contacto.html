<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | CFA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

  <div id="header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="badge-cfa">Contacto</span>
        <h1>Comunicate con CFA</h1>
        <p>Consultas institucionales, deportivas, inscripciones y comunicación oficial.</p>
      </div>
    </section>

    <section class="section-light">
      <div class="container">
        <div class="row g-5">
          <div class="col-lg-5">
            <h2>Canales oficiales</h2>
            <p>Podés contactarnos por redes sociales o completar el formulario.</p>

            <div class="contact-info">
              <p><strong>Instagram:</strong> @cbafootballamericano</p>
              <p><strong>Email:</strong> contacto@cfa.com</p>
              <p><strong>Ubicación:</strong> Córdoba, Argentina</p>
            </div>
          </div>

          <div class="col-lg-7">
            <form class="contact-form">
              <div class="row g-3">
                <div class="col-md-6">
                  <label>Nombre</label>
                  <input type="text" class="form-control" placeholder="Tu nombre">
                </div>
                <div class="col-md-6">
                  <label>Email</label>
                  <input type="email" class="form-control" placeholder="tu@email.com">
                </div>
                <div class="col-12">
                  <label>Asunto</label>
                  <input type="text" class="form-control" placeholder="Motivo del contacto">
                </div>
                <div class="col-12">
                  <label>Mensaje</label>
                  <textarea class="form-control" rows="5" placeholder="Escribí tu mensaje"></textarea>
                </div>
                <div class="col-12">
                  <button type="submit" class="btn btn-cfa">Enviar mensaje</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
